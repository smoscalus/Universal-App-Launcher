<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Universal Launcher Debug</title>
</head>

<body>
    <h1>🚀 Launcher Core Test</h1>

    <div id="ui">
        <input type="text" id="name" placeholder="Назва">
        <input type="text" id="path" placeholder="Шлях">
        <button onclick="save()">Зберегти</button>
    </div>

    <script src="launcher.js"></script>

    <script>
        let core;
        createLauncherModule().then(Module => {
            core = Module;
            console.log("✅ WASM Core загружено успешно!");
        });

        function save() {
            const n = document.getElementById('name').value;
            const p = document.getElementById('path').value;

            if (core && core.createResource) {
                const request = {
                    name: n,
                    description: "Some description",
                    path: p,
                    userId: 42
                };

                const response = core.createResource(request);

                console.log("ID:", response.id);
                console.log("Success:", response.success);
                console.log("Message:", response.message);
            } else {
                console.error("❌ WASM не готов");
            }
        }
    </script>
</body>

</html>
