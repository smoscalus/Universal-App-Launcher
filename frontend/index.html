<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal App Launcher & Manager</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <header class="window-bar">
        <div class="window-controls-group">
            <div class="nav-arrows">
                <button class="arrow-btn" id="prev-btn" title="Back" disabled>←</button>
                <button class="arrow-btn" id="next-btn" title="Forward" disabled>→</button>
            </div>

            <div class="breadcrumbs-container" id="breadcrumbs">
                <span>Control Panel</span>
            </div>

            <div id="user-controls-container" style="display: none; flex-direction: row; align-items: center; gap: 6px;">
                <select class="preset-btn" id="user-select">
                </select>
                <button class="win-btn" id="btn-add-user" title="Create new user">+</button>
                <button class="win-btn" id="btn-delete-user" title="Delete current user">×</button>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="search-container" style="display: flex; gap: 6px; align-items: center;">
                <button id="btn-search-mode" title="Change search mode">
                    Cat.
                </button>
                <input type="text" id="search-input" placeholder="Search in category...">
            </div>
            
            <nav class="sidebar-collections" id="sidebar-collections-list">
            </nav>

            <div class="sidebar-footer">
                <button class="btn btn-secondary" id="btn-download">Add resource</button>
                <button class="btn btn-primary" id="btn-add-collection">Add collection</button>
            </div>
        </aside>

        <main class="content-area">
            <header class="tabs-header" id="tabs-container">
            </header>

            <div class="content-body" id="content-body">
                
                <div class="empty-state" id="empty-state">
                    <div class="empty-state-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                            <path d="M12 11v6M9 14h6" opacity="0.5"></path>
                        </svg>
                    </div>
                    <h3>Collection is empty</h3>
                    <p>You don't have any resources in this collection yet.</p>
                    <button class="btn btn-primary" id="btn-empty-add-resource">Add Resource</button>
                </div>

                <div class="grid-container" id="grid-container" style="display: none;">
                </div>

                <div id="detail-area" style="display: none;">
                    <div id="detail-preview" style="width: 100%; height: 320px; background: linear-gradient(135deg, #3a4454, #28303d); border-radius: 8px; margin-bottom: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; overflow: hidden;">
                        <img id="detail-img-render" src="" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                        <svg id="detail-placeholder-svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                        
                        <input type="file" id="modal-file-input" accept="image/*" style="display: none;">
                        <button class="btn btn-secondary" id="btn-change-image" style="position: absolute; bottom: 10px; left: 10px; max-width: 160px; background: rgba(40,48,61,0.8); backdrop-filter: blur(4px);">Add/Change Image</button>
                    </div>
                    
                    <div style="display: flex; gap: 15px; margin-bottom: 15px;">
                        <input type="text" id="input-detail-name" placeholder="Name" style="flex: 1; border-radius: 6px; padding: 10px; color: #fff; outline: none;">
                        <input type="text" id="input-detail-path" placeholder="Path or URL" style="flex: 2; border-radius: 6px; padding: 10px; color: #fff; outline: none;">
                    </div>
                    
                    <textarea id="input-detail-description" placeholder="Enter entity description here..." style="width: 100%; height: 100px; border-radius: 6px; padding: 10px; color: #fff; outline: none; margin-bottom: 15px; resize: none;"></textarea>

                    <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px;">
                        <button class="btn btn-secondary" id="btn-detail-back" style="max-width: 100px;">Back</button>
                        <button class="btn btn-secondary" id="btn-detail-delete" style="background-color: #da3633; max-width: 100px;">Delete</button>
                        <button class="btn btn-secondary" id="btn-detail-save" style="max-width: 100px;">Save</button>
                        <button class="btn btn-primary" id="btn-detail-run" style="max-width: 120px;">Run</button>
                    </div>
                </div>

            </div>

            <footer class="content-footer" style="height: 24px;">
            </footer>
        </main>
    </div>

    <div class="login-overlay" id="login-overlay">
        <div class="login-card">
            <h2>Log in to your profile</h2>
            <p>Enter your profile details</p>
            <form id="login-form">
                <div class="input-group">
                    <input type="text" id="login-name" placeholder="Username (e.g. Ivan)" required>
                </div>
                <button type="submit" class="btn btn-primary login-submit-btn">Sign in</button>
            </form>
        </div>
    </div>

    <script src="/app.js"></script>
</body>
</html>
